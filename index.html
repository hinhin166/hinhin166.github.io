<!DOCTYPE html>
<html>
<head>
  <title>A/B Test</title>
</head>
<body>

<h1 id="title"></h1>

<script>
  // random A hoặc B
  var version = Math.random() < 0.5 ? "A" : "B";

  if (version === "A") {
    document.getElementById("title").innerText =
      "7일 만에 메이크업 아티스트 되는 방법 5가지";
  } else {
    document.getElementById("title").innerText =
      "재능 없어도 OK! 7일 만에 메이크업 아티스트 되기";
  }
</script>

<button>Click vào đây</button>

</body>
</html>
